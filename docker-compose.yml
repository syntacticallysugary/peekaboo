services:
  postgres:
    image: postgres:16-alpine
    container_name: peekaboo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: peekaboo
      POSTGRES_PASSWORD: peekaboo
      POSTGRES_DB: peekaboo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peekaboo -d peekaboo"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: peekaboo-mqtt
    restart: unless-stopped
    # Host network so the loopback (1883) listener is reachable by the
    # command-module (also host-network), while 8883/TLS is exposed to the LAN.
    network_mode: host
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    depends_on:
      - postgres

  command-module:
    build: ./command-module
    container_name: peekaboo-command
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgresql+asyncpg://peekaboo:peekaboo@localhost/peekaboo
      MQTT_BROKER_HOST: 127.0.0.1
      MQTT_BROKER_PORT: "1883"
      MQTT_USERNAME: command-module
      MQTT_PASSWORD: ${MQTT_COMMAND_PASSWORD:-}
      INFERENCE_NODE_URL: ${INFERENCE_NODE_URL:-http://localhost:8001}
      CAMERA_HEARTBEAT_TIMEOUT_S: 360
      RECORDINGS_PATH: /data/recordings
      PORT: 8081
      # HTTPS/TLS configuration (optional: enable by uncommenting and generating certs with tools/gen-self-signed-cert.sh)
      # TLS_CERTFILE: /certs/server.crt
      # TLS_KEYFILE: /certs/server.key
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    volumes:
      - ./data/recordings:/data/recordings
      - ./data/firmware:/data/firmware
      # Uncomment to enable HTTPS/TLS:
      # - ./mosquitto/certs:/certs:ro

volumes:
  postgres_data:
