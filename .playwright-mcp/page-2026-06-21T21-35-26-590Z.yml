            - paragraph [ref=e645]: With this preparation, you can start writing programs for XIAO ESP32-S3 to compile and upload.
            - heading "BootLoader ModeDirect link to BootLoader Mode" [level=3] [ref=e646]:
              - text: BootLoader Mode
              - link "Direct link to BootLoader Mode" [ref=e647] [cursor=pointer]:
                - /url: "#bootloader-mode"
                - text: "#"
            - paragraph [ref=e648]: "Sometimes, using the wrong program can cause the XIAO to lose its port or not function correctly. Common issues include:"
            - list [ref=e649]:
              - listitem [ref=e650]:
                - text: The XIAO is connected to the computer, but
                - emphasis [ref=e651]: no port number
                - text: is found.
              - listitem [ref=e652]:
                - text: The XIAO is connected, and a port number appears, but the
                - emphasis [ref=e653]: program upload fails
                - text: .
            - paragraph [ref=e654]: "When you encounter the above two situations, you can try to put XIAO into BootLoader mode, which can solve most of the problems of unrecognized devices and failed uploads. The specific method is:"
            - list [ref=e655]:
              - listitem [ref=e656]:
                - strong [ref=e657]: Step 1
                - text: . Press and hold the
                - code [ref=e658]: BOOT
                - text: button on the XIAO ESP32-S3 without releasing it.
              - listitem [ref=e659]:
                - strong [ref=e660]: Step 2
                - text: . Keep the
                - code [ref=e661]: BOOT
                - text: button pressed and then connect to the computer via the data cable. Release the
                - code [ref=e662]: BOOT
                - text: button after connecting to the computer.
              - listitem [ref=e663]:
                - strong [ref=e664]: Step 3
                - text: . Upload the
                - strong [ref=e665]: File > Examples > 01.Basics > Blink
                - text: program to check the operation of the XIAO ESP32-S3.
            - img [ref=e667]
            - heading "ResetDirect link to Reset" [level=3] [ref=e668]:
              - text: Reset
              - link "Direct link to Reset" [ref=e669] [cursor=pointer]:
                - /url: "#reset"
                - text: "#"
            - paragraph [ref=e670]:
              - text: When the program runs abnormally, you can press
              - code [ref=e671]: Reset
              - text: once during power-up to let XIAO re-execute the uploaded program.
            - paragraph [ref=e672]:
              - text: When you press and hold the
              - code [ref=e673]: BOOT
              - text: key while powering up and then press the
              - code [ref=e674]: Reset
              - text: key once, you can also enter BootLoader mode.
            - heading "Run your first Blink programDirect link to Run your first Blink program" [level=3] [ref=e675]:
              - text: Run your first Blink program
              - link "Direct link to Run your first Blink program" [ref=e676] [cursor=pointer]:
