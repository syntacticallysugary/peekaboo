              - text: If you encounter the above problem, it is recommended that you first try pressing the reset button on the XIAO ESP32-S3 to try to get the program running again. If the problem persists, please recheck your program and read the methods provided in
              - strong [ref=e807]:
                - link "BootLoader Mode" [ref=e808] [cursor=pointer]:
                  - /url: "#bootloader-mode"
