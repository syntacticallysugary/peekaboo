            - 'heading "Q2: Why does my XIAO have the problem of not being flush at the rounded corners? Is this a quality problem?Direct link to Q2: Why does my XIAO have the problem of not being flush at the rounded corners? Is this a quality problem?" [level=3] [ref=e809]':
              - text: "Q2: Why does my XIAO have the problem of not being flush at the rounded corners? Is this a quality problem?"
              - 'link "Direct link to Q2: Why does my XIAO have the problem of not being flush at the rounded corners? Is this a quality problem?" [ref=e810] [cursor=pointer]':
                - /url: "#q2-why-does-my-xiao-have-the-problem-of-not-being-flush-at-the-rounded-corners-is-this-a-quality-problem"
                - text: "#"
            - img [ref=e812]
            - paragraph [ref=e813]: First of all, it should be noted that this is not a quality issue and will not affect the normal function of XIAO.
            - paragraph [ref=e814]: XIAO ESP32-S3 is the most complex one in all XIAO because of its high integration, and the PCB needs to be put together in factory production. Due to the high level of integration, the splicing board connection can only be placed at the four rounded corners, which will lead to the problem of uneven rounded corners on the picture. We will try to improve the process to ensure that this problem will be solved in the subsequent production.
