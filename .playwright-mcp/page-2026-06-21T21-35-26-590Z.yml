            - paragraph [ref=e477]: XIAO ESP32-S3 is shipped without pin headers by default, you need to prepare your own pin headers and solder it to the corresponding pins of XIAO so that you can connect to the expansion board or sensor.
            - paragraph [ref=e478]: Due to the miniature size of XIAO ESP32-S3, please be careful when soldering headers, do not stick different pins together, and do not stick solder to the shield or other components. Otherwise, it may cause XIAO to short circuit or not work properly, and the consequences caused by this will be borne by the user.
            - img [ref=e480]
            - heading "Installation of antennaDirect link to Installation of antenna" [level=4] [ref=e481]:
