            - heading "Strapping PinsDirect link to Strapping Pins" [level=3] [ref=e417]:
              - text: Strapping Pins
              - link "Direct link to Strapping Pins" [ref=e418] [cursor=pointer]:
                - /url: "#strapping-pins"
                - text: "#"
            - paragraph [ref=e419]: At each startup or reset, a chip requires some initial configuration parameters, such as in which boot mode to load the chip, voltage of flash memory, etc. These parameters are passed over via the strapping pins. After reset, the strapping pins operate as regular IO pins.
            - paragraph [ref=e420]: "The parameters controlled by the given strapping pins at chip reset are as follows:"
            - list [ref=e421]:
              - listitem [ref=e422]:
                - strong [ref=e423]: Chip boot mode
                - text: – GPIO0 and GPIO46
              - listitem [ref=e424]:
                - strong [ref=e425]: VDD_SPI voltage
                - text: – GPIO45
              - listitem [ref=e426]:
                - strong [ref=e427]: ROM messages printing
                - text: – GPIO46
              - listitem [ref=e428]:
                - strong [ref=e429]: JTAG signal source
                - text: – GPIO3
            - paragraph [ref=e430]: GPIO0, GPIO45, and GPIO46 are connected to the chip’s internal weak pull-up/pull-down resistors at chip reset. These resistors determine the default bit values of the strapping pins. Also, these resistors determine the bit values if the strapping pins are connected to an external high-impedance circuit.
            - img [ref=e432]
            - paragraph [ref=e433]: To change the bit values, the strapping pins should be connected to external pull-down/pull-up resistances. If the ESP32-S3 is used as a device by a host MCU, the strapping pin voltage levels can also be controlled by the host MCU.
            - paragraph [ref=e434]: All strapping pins have latches. At system reset, the latches sample the bit values of their respective strapping pins and store them until the chip is powered down or shut down. The states of latches cannot be changed in any other way. It makes the strapping pin values available during the entire chip operation, and the pins are freed up to be used as regular IO pins after reset.
            - paragraph [ref=e435]: Regarding the timing requirements for the strapping pins, there are such parameters as setup time and hold time.
            - img [ref=e437]
            - img [ref=e439]
            - heading "Getting StartedDirect link to Getting Started" [level=2] [ref=e440]:
              - text: Getting Started
