            - paragraph [ref=e490]: If you are shopping for the XIAO ESP32-S3 Sense, then you should also include an expansion board. This expansion board has a 1600x1200 OV2640/2048x1536 OV3660 camera sensor, Onboard SD Card Slot and digital microphone.
            - paragraph [ref=e491]: By installing the expansion board with XIAO ESP32-S3 Sense, you can use the functions on the expansion board.
            - paragraph [ref=e492]: Installing the expansion board is very simple, you just need to align the connector on the expansion board with the B2B connector on the XIAO ESP32-S3, press it hard and hear a "click", the installation is complete.
            - img [ref=e494]
            - paragraph [ref=e495]: We now have a new fully XIAO ESP32-S3 Sense-compatible powerful camera, the OV5640, on our shelves, and if you purchase it, you can replace the camera to use it.
