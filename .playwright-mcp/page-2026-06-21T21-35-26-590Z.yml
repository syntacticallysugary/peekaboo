              - link "Direct link to Installation of antenna" [ref=e482] [cursor=pointer]:
                - /url: "#installation-of-antenna"
                - text: "#"
            - paragraph [ref=e483]: On the bottom left of the front of XIAO ESP32-S3, there is a separate "WiFi/BT Antenna Connector". In order to get better WiFi/Bluetooth signal, you need to take out the antenna inside the package and install it on the connector.
            - paragraph [ref=e484]: There is a little trick to the installation of the antenna, if you press down hard on it directly, you will find it very difficult to press and your fingers will hurt! The correct way to install the antenna is to put one side of the antenna connector into the connector block first, then press down a little on the other side, and the antenna will be installed.
            - paragraph [ref=e485]: Remove the antenna is also the case, do not use brute force to pull the antenna directly, one side of the force to lift, the antenna is easy to take off.
