                - text: "#"
            - paragraph [ref=e677]: By now, I believe you have a good understanding of the features and hardware of the XIAO ESP32-S3. Next, let's take the simplest Blink program as an example and perform the first blink for your XIAO ESP32-S3!
            - list [ref=e678]:
              - listitem [ref=e679]:
                - strong [ref=e680]: Step 1.
                - text: Launch the Arduino application.
              - listitem [ref=e681]:
                - strong [ref=e682]: Step 2.
                - text: Navigate to
                - strong [ref=e683]: File > Examples > 01.Basics > Blink
                - text: ", open the program."
            - img [ref=e685]
            - list [ref=e686]:
              - listitem [ref=e687]:
                - strong [ref=e688]: Step 3.
                - text: Select the board model to
                - strong [ref=e689]: XIAO ESP32-S3
                - text: ", and select the correct port number to upload the program."
            - img [ref=e691]
            - paragraph [ref=e692]: Once the program is successfully uploaded, you will see the following output message and you can observe that the orange LED on the right side of the XIAO ESP32-S3 is blinking.
            - table [ref=e693]:
              - row [ref=e694]:
                - cell [ref=e695]:
                  - img [ref=e697]
                - cell [ref=e698]:
                  - img [ref=e700]
            - paragraph [ref=e701]: Congratulations, you've learned how to write and upload programs for the XIAO ESP32-S3!
            - generic [ref=e702]:
              - generic [ref=e703]:
                - img [ref=e705]
                - text: note
              - paragraph [ref=e708]: The LED will only turn off when the user LED pin on the XIAO ESP32-S3 is set to a high level, and it will only turn on when the pin is set to a low level.
            - heading "Battery UsageDirect link to Battery Usage" [level=2] [ref=e709]:
              - text: Battery Usage
              - link "Direct link to Battery Usage" [ref=e710] [cursor=pointer]:
                - /url: "#battery-usage"
                - text: "#"
            - paragraph [ref=e711]: The XIAO ESP32-S3 series has a built-in power management chip that allows the XIAO ESP32-S3 to be powered independently by using a battery or to charge the battery through the XIAO ESP32-S3's USB port.
            - paragraph [ref=e712]: If you want to connect the battery for XIAO, we recommend you to purchase qualified rechargeable 3.7V lithium battery. When soldering the battery, please be careful to distinguish between the positive and negative terminals. The negative terminal of the power supply should be the side closest to the USB port, and the positive terminal of the power supply is the side away from the USB port.
            - img [ref=e714]
            - generic [ref=e715]:
              - generic [ref=e716]:
                - img [ref=e718]
                - text: note
              - generic [ref=e720]:
                - paragraph [ref=e721]: Since all GPIO pins of the XIAO ESP32-S3 are assigned their own functions, we do not have a GPIO configured for the battery pin. this means that we cannot get the battery voltage at the software level by reading the analog value of one of the GPIOs. If necessary, you can consider connecting the positive and negative terminals of the battery to two of the pins to measure the battery voltage.
                - img [ref=e723]
            - generic [ref=e724]:
              - generic [ref=e725]:
                - img [ref=e727]
                - text: caution
              - paragraph [ref=e730]: When you use battery power, there will be no voltage on the 5V pin.
            - paragraph [ref=e731]: At the same time, we designed a red indicator light for battery charging, through the indicator light display to inform the user of the current state of the battery in the charge.
            - list [ref=e732]:
              - listitem [ref=e733]: When XIAO ESP32-S3 is not connected to the battery, the red light comes on when the Type-C cable is connected and goes off after 30 seconds.
              - listitem [ref=e734]: The red light flashes when the battery is connected and the Type-C cable is connected for charging.
              - listitem [ref=e735]: When connecting Type-C to charge the battery fully, the red light turns off.
            - img [ref=e737]
            - heading "UF2 BootLoaderDirect link to UF2 BootLoader" [level=2] [ref=e738]:
              - text: UF2 BootLoader
              - link "Direct link to UF2 BootLoader" [ref=e739] [cursor=pointer]:
                - /url: "#uf2-bootloader"
                - text: "#"
            - paragraph [ref=e740]: We understand that some users are looking to flash UF2 files directly to XIAO, which will enable the process of batch flashing programs. Here we will describe this method.
            - generic [ref=e741]:
              - tablist [ref=e742]:
                - tab "Method I" [selected] [ref=e743] [cursor=pointer]
                - tab "Method II" [ref=e744] [cursor=pointer]
              - tabpanel [ref=e746]:
                - generic [ref=e747]:
                  - generic [ref=e748]:
                    - img [ref=e750]
                    - text: note
                  - paragraph [ref=e753]: This method is currently only available on Windows systems.
                - paragraph [ref=e754]:
                  - strong [ref=e755]: Step 1
                  - text: ": Download and Extract the Script"
                - paragraph [ref=e756]: "Download the required script zip file and extract it to your local machine:"
                - paragraph [ref=e757]:
                  - emphasis [ref=e758]:
                    - link "https://files.seeedstudio.com/wiki/SeeedStudio-XIAO-ESP32S3/res/xiaos3-bin2uf2.zip" [ref=e759] [cursor=pointer]:
                      - /url: https://files.seeedstudio.com/wiki/SeeedStudio-XIAO-ESP32S3/res/xiaos3-bin2uf2.zip
                - paragraph [ref=e760]:
                  - strong [ref=e761]: Step 2
                  - text: ": Convert BIN Files to UF2 Files"
                - paragraph [ref=e762]:
                  - text: After compiling and saving an Arduino program, you can export the binary
                  - code [ref=e763]: BIN
                  - text: file. This file will be generated in your Arduino project folder.
                - img [ref=e765]
                - paragraph [ref=e766]:
                  - text: Copy the
                  - code [ref=e767]: BIN
                  - text: file to the
                  - strong [ref=e768]: xiaos3-bin2uf2
                  - text: directory that you extracted earlier. Then, run the
                  - strong [ref=e769]: convert_uf2.bat
                  - text: script to generate a UF2 file, which will require the name of your
                  - code [ref=e770]: bin
                  - text: file.
                - paragraph [ref=e771]:
                  - strong [ref=e772]: Step 3
                  - text: ": Enter UF2 BootLoader Mode"
                - paragraph [ref=e773]:
                  - text: Connect the XIAO to your computer and run the
                  - strong [ref=e774]: boot_uf2.bat
                  - text: script. The XIAO will appear on your computer as a USB drive, indicating it has successfully entered UF2 BootLoader mode.
                - img [ref=e776]
                - paragraph [ref=e777]:
                  - strong [ref=e778]: Step 4
                  - text: ": Copy the UF2 File to XIAO ESP32-S3"
                - paragraph [ref=e779]: Access the XIAO ESP32-S3's USB drive and copy the converted UF2 file to it. Once the copying is complete, the XIAO USB drive will automatically disappear, and the program will start running.
                - generic [ref=e780]:
                  - generic [ref=e781]:
                    - img [ref=e783]
                    - text: tip
                  - list [ref=e786]:
                    - listitem [ref=e787]: Ensure your program is compiled and running correctly; otherwise, the UF2 file may not execute as expected.
                    - listitem [ref=e788]:
                      - text: A sample UF2 file for Blink is provided in the
                      - strong [ref=e789]: xiaos3-bin2uf2
                      - text: folder. When uploaded, the orange LED on the XIAO ESP32-S3 will blink. You can use this UF2 file as a test.
                - paragraph [ref=e790]:
                  - strong [ref=e791]: Step 5
                  - text: ": Re-enter UF2 BootLoader Mode"
                - paragraph [ref=e792]:
                  - text: If you need to re-enter UF2 BootLoader mode to upload another UF2 file, quickly press the
                  - strong [ref=e793]: Reset
                  - text: button followed by the
                  - strong [ref=e794]: Boot
                  - text: button. There’s no need to run the boot_uf2.bat script again.
                - generic [ref=e795]:
                  - generic [ref=e796]:
                    - img [ref=e798]
                    - text: note
                  - paragraph [ref=e801]: Press Reset, then Boot, quickly!
