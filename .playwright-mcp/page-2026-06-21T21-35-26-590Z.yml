                - text: "#"
            - paragraph [ref=e442]: To enable you to get started with the XIAO ESP32-S3 faster, please read the hardware and software preparation below to prepare the XIAO.
            - list [ref=e443]:
              - listitem [ref=e444]:
                - strong [ref=e445]: XIAO ESP32-S3
            - paragraph [ref=e446]: The factory program preset in the regular version is the touch pin light-up program. When you power up the XIAO, touch some of its pins and the orange user indicator will light up.
            - img [ref=e448]
            - list [ref=e449]:
