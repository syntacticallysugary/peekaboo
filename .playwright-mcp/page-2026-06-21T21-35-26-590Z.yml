            - paragraph [ref=e514]: Ensure optimal cooling for your XIAO ESP32-S3 Sense by installing our upgraded heat sink. This new design is tailored to address the cooling deficiencies observed with the previous models, particularly during intensive operations like camera usage. Feedback highlighted that the original heat sink did not adequately dissipate heat, leading to the development of a more effective solution.
            - group [ref=e515]:
              - generic "Click to View Performance Comparison" [ref=e516] [cursor=pointer]
            - paragraph [ref=e517]:
              - emphasis [ref=e518]:
                - strong [ref=e519]: "Gather the following items before starting the installation:"
            - list [ref=e520]:
              - listitem [ref=e521]: Selected heat sink (single or dual)
              - listitem [ref=e522]: A clean ESP32S3
            - paragraph [ref=e523]: Ensure your device is powered off and unplugged from any power source before you start.
            - generic [ref=e524]:
              - generic [ref=e525]:
                - img [ref=e527]
                - text: notice
              - generic [ref=e529]:
                - paragraph [ref=e530]:
                  - emphasis [ref=e531]:
                    - strong [ref=e532]: "Purchasing Note:"
                  - text: When purchasing your XIAO ESP32-S3 Sense, it's important to note that only
                  - strong [ref=e533]: models equipped with a camera
                  - text: come with a heat sink included. If you have a version of the ESP32S3 that does not include a camera, you will need to purchase a heat sink separately.
                - paragraph [ref=e534]:
                  - emphasis [ref=e535]:
                    - strong [ref=e536]: "Installation Tip:"
                  - text: Prioritize covering the Thermal PAD with the heat sink, as it is directly above the ESP32S3 chip, the primary source of heat. Proper alignment ensures optimal heat dissipation, and note keep the BAT pins as unobstructed as possible.
            - paragraph [ref=e537]: "Now, let’s begin the installation process:"
            - paragraph [ref=e538]:
              - emphasis [ref=e539]:
                - strong [ref=e540]: "Step 1. Prepare the Heat Sink:"
              - text: Start by removing the protective cover from the heat sink to expose the thermal adhesive. This will prepare the heat sink for a secure attachment to the ESP32S3 chip.
