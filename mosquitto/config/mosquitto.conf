# Peekaboo MQTT broker — hardened.
#
# Two listeners:
#   1883 on loopback only  — plaintext, for the command-module (runs on this
#                            host with network_mode: host). Traffic never leaves
#                            the machine, so TLS would only add overhead.
#   8883 on all interfaces — TLS, for the cameras over the LAN. Cameras verify
#                            the broker against the embedded CA; the broker
#                            authenticates cameras with username/password.
#
# Authentication and ACLs are global (per_listener_settings defaults to false in
# Mosquitto 2.0), so both listeners require credentials and obey the ACL.

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# No unauthenticated access on either listener.
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ── Loopback listener (command-module) ───────────────────────────────────────
listener 1883 127.0.0.1

# ── TLS listener (cameras) ───────────────────────────────────────────────────
listener 8883 0.0.0.0
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
tls_version tlsv1.2
# Server-auth TLS only: cameras prove identity with username/password, not a
# client certificate. Flip to true (and provision client certs) to require mTLS.
require_certificate false
