; ── ESP32-CAM (AI Thinker) — LX6 streaming camera, no on-device ML ─────────
; Uses the same s3eye source tree; ML components are excluded because they
; declare esp32s3 as their only supported target in their own manifests.
; Upload requires a USB-UART adapter (FTDI/CH340); adjust upload_port as needed.
[env:esp32cam_01]
platform = espressif32
board = esp32cam
framework = espidf
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = partitions_s3eye.csv
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
upload_port = /dev/ttyUSB0
upload_flags =
    --before
    default_reset
    --after
    hard_reset
custom_sdkconfig_path = sdkconfig.esp32cam.defaults
extra_scripts = pre:pre_build_espdl.py
build_flags =
    ${common_idf.build_flags}
    -D CAMERA_ID="\"esp32cam-01\""
    -D BOARD_ESP32CAM
    -D FIRMWARE_CHANNEL="\"esp32cam\""
    -D FIRMWARE_VERSION="\"1.7.0\""
    -D MQTT_TASK_STACK=12288
build_src_filter = +<s3eye/>

; ── Data collection environments (Arduino, no WiFi, SD card recorder) ────────

[env:xiao_collect]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esp-builtin
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D BOARD_XIAO_S3
build_src_filter = +<data_collect/>

[env:s3eye_collect]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = qio
