; Common settings for Arduino-based boards
[common]
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -D WIFI_SSID="\"${sysenv.WIFI_SSID}\""
    -D WIFI_PASSWORD="\"${sysenv.WIFI_PASSWORD}\""
    -D HUB_URL="\"${sysenv.HUB_URL}\""
    -D SECRET_PSK="\"${sysenv.SECRET_PSK}\""

; Common settings for ESP-IDF based boards (S3-EYE)
[common_idf]
build_flags =
    -D DEFAULT_COOLDOWN_S=600
    -D DEFAULT_MOTION_THRESHOLD=20
    -D CONFIG_POLL_INTERVAL_S=300

; ESP32-CAM environment
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = huge_app.csv
lib_deps =
    https://github.com/espressif/esp32-camera.git
build_flags =
    ${common.build_flags}
    -D BOARD_TYPE=1
build_src_filter = +<*> -<camera_test/>

; ESP32-S3-SPY environment
[env:esp32s3spy]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.psram = qio
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
build_flags =
    ${common.build_flags}
    -D BOARD_TYPE=2
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ESP32-S3-EYE environment — ESP-IDF framework for ESP-WHO on-device face detection
[env:esp32s3eye]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.psram = opi
board_build.partitions = partitions_s3eye.csv
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
upload_port = /dev/s3eye
upload_flags =
    --before
    usb_reset
    --after
    hard_reset
custom_sdkconfig_path = sdkconfig.s3eye.defaults
extra_scripts = pre:pre_build_espdl.py
build_flags =
    ${common_idf.build_flags}
    -D CAMERA_ID="\"s3eye-01\""
    -D FIRMWARE_CHANNEL="\"s3eye\""
    -D FIRMWARE_VERSION="\"1.0.0\""
build_src_filter = +<s3eye/>

; Second ESP32-S3-EYE unit
[env:esp32s3eye_02]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.psram = opi
board_build.partitions = partitions_s3eye.csv
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
upload_port = /dev/s3eye_02
custom_sdkconfig_path = sdkconfig.s3eye.defaults
extra_scripts = pre:pre_build_espdl.py
build_flags =
    ${common_idf.build_flags}
    -D CAMERA_ID="\"s3eye-02\""
    -D FIRMWARE_VERSION="\"1.0.0\""
build_src_filter = +<s3eye/>

