name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Security scanning
  security:
    uses: ./.github/workflows/security-scans.yml

  # Backend testing & type checking
  backend:
    uses: ./.github/workflows/test-backend.yml

  # Frontend build
  frontend:
    uses: ./.github/workflows/build-frontend.yml

  # Firmware build
  firmware:
    uses: ./.github/workflows/build-firmware.yml

  # Final status check
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [security, backend, frontend, firmware]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Security scans: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Backend tests: ${{ needs.backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Frontend build: ${{ needs.frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Firmware build: ${{ needs.firmware.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.security.result }}" = "failure" ] || \
             [ "${{ needs.frontend.result }}" = "failure" ] || \
             [ "${{ needs.firmware.result }}" = "failure" ]; then
            echo "❌ CI pipeline failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ CI pipeline passed" >> $GITHUB_STEP_SUMMARY
